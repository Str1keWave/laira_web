<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>LaiRA stream_test — visual pipeline demo</title>
  <style>
    html, body {
      margin: 0; padding: 0; background: #111; color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100%;
    }
    body {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    #stage {
      position: relative;
      max-width: 100vw;
    }
    #video, #overlay {
      display: block;
      max-width: 100%;
      max-height: 70vh;
    }
    #overlay {
      position: absolute; top: 0; left: 0;
      pointer-events: none;
    }
    #status-list {
      display: grid;
      grid-template-columns: auto auto;
      gap: 4px 12px;
      margin: 12px 0 4px;
      font-size: 12px;
      color: #aaa;
    }
    #status-list .label  { text-align: right; }
    #status-list .value  { display: flex; align-items: center; gap: 6px; }
    #status-list .dot {
      display: inline-block; width: 9px; height: 9px; border-radius: 50%;
      background: #555;
    }
    .dot.ok   { background: #2ecc71; }
    .dot.busy { background: #f1c40f; animation: pulse 1.4s infinite; }
    .dot.err  { background: #e74c3c; }
    @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.35 } }
    #status {
      margin: 4px 0 6px;
      font-size: 13px;
      color: #ccc;
      min-height: 18px;
      max-width: 90vw;
      text-align: center;
    }
    #prompt-row {
      display: flex; gap: 8px; align-items: center;
      width: min(720px, 90vw);
      margin: 8px 0 24px;
    }
    #prompt {
      flex: 1;
      padding: 10px 12px;
      font-size: 14px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #1c1c1c; color: #eee;
    }
    #prompt:disabled { color: #777; background: #181818; }
    #send {
      padding: 10px 16px;
      background: #2b6cb0; color: white;
      border: none; border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    #send:disabled { background: #555; cursor: not-allowed; }
    #legend {
      position: absolute; top: 8px; left: 8px;
      background: rgba(0,0,0,0.55); padding: 6px 10px; border-radius: 4px;
      font-size: 11px; line-height: 1.5;
    }
    .sw { display: inline-block; width: 10px; height: 10px; vertical-align: middle; margin-right: 4px; }
  </style>
</head>
<body>
  <h2 style="margin: 16px 0 6px">LaiRA stream_test</h2>

  <div id="status-list">
    <div class="label">webcam</div>
    <div class="value"><span class="dot" id="dot-camera"></span><span id="lbl-camera">off</span></div>
    <div class="label">opencv.js</div>
    <div class="value"><span class="dot" id="dot-cv"></span><span id="lbl-cv">loading…</span></div>
    <div class="label">server config</div>
    <div class="value"><span class="dot" id="dot-config"></span><span id="lbl-config">fetching…</span></div>
    <div class="label">SAM 2 (Modal)</div>
    <div class="value"><span class="dot" id="dot-modal"></span><span id="lbl-modal">checking…</span></div>
  </div>

  <div id="status"></div>

  <div id="stage">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <div id="legend">
      <div><span class="sw" style="background:#ff3b30"></span>local tracker (every frame)</div>
      <div><span class="sw" style="background:#0af"></span>SAM 2 snap (~1 Hz)</div>
    </div>
  </div>

  <div id="prompt-row">
    <input id="prompt" placeholder='waiting on dependencies…'
           autocomplete="off" disabled />
    <button id="send" disabled>Send</button>
  </div>

  <!-- OpenCV.js for matchTemplate-based browser tracker. -->
  <script async src="https://docs.opencv.org/4.10.0/opencv.js" id="opencvjs"></script>

  <script>
  (() => {
    const $status  = document.getElementById('status');
    const $video   = document.getElementById('video');
    const $overlay = document.getElementById('overlay');
    const $prompt  = document.getElementById('prompt');
    const $send    = document.getElementById('send');
    const ctx = $overlay.getContext('2d');

    // Component readiness — gates the prompt UI.
    const components = {
      camera: 'busy',  // 'busy' | 'ok' | 'err'
      cv:     'busy',
      config: 'busy',
      modal:  'busy',
    };

    const state = {
      modalUrl:       null,
      ws:             null,            // WebSocket to Modal tracker
      sessionId:      'sess-' + Math.random().toString(36).slice(2, 10),
      tracking:       false,
      lastBbox:       null,            // [x, y, w, h] in video pixels
      template:       null,            // cv.Mat; the ROI we matchTemplate against
      lastSnap:       0,
      snapEveryMs:    1000,
      sentInFlight:   false,           // throttle so we don't queue Modal calls
      lastSamBbox:    null,            // for cyan flash overlay
      lastSamAt:      0,
      reconnectTried: false,           // one-shot WS reconnect on drop
    };

    function setStatus(msg) {
      $status.textContent = msg;
      if (msg) console.log('[status]', msg);
    }

    function setComponent(name, status, label) {
      components[name] = status;
      const dot = document.getElementById('dot-' + name);
      const lbl = document.getElementById('lbl-' + name);
      if (dot) {
        dot.classList.remove('ok', 'busy', 'err');
        dot.classList.add(status);
      }
      if (lbl) lbl.textContent = label;
      maybeEnableUI();
    }

    function allReady() {
      return Object.values(components).every(s => s === 'ok');
    }

    function maybeEnableUI() {
      const ready = allReady();
      $prompt.disabled = !ready;
      $send.disabled = !ready;
      if (ready) {
        if (state.tracking) {
          $prompt.placeholder = 'tracking — type a new prompt to retarget';
        } else {
          $prompt.placeholder = 'e.g. "follow me" — press enter';
          $prompt.focus();
        }
      } else {
        const waiting = Object.entries(components)
          .filter(([_, s]) => s !== 'ok').map(([n]) => n);
        $prompt.placeholder = 'waiting on: ' + waiting.join(', ');
      }
    }

    // ---------- 1) webcam ----------
    async function startWebcam() {
      setComponent('camera', 'busy', 'requesting permission…');
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: { ideal: 640 }, height: { ideal: 480 } },
          audio: false,
        });
        $video.srcObject = stream;
        await new Promise(r => $video.addEventListener('loadedmetadata', r, { once: true }));
        $overlay.width = $video.videoWidth;
        $overlay.height = $video.videoHeight;
        setComponent('camera', 'ok', `live (${$video.videoWidth}×${$video.videoHeight})`);
      } catch (err) {
        setComponent('camera', 'err', 'blocked: ' + err.message);
      }
    }

    // ---------- 2) opencv.js ----------
    window.Module = {
      onRuntimeInitialized() {
        setComponent('cv', 'ok', 'ready');
      }
    };
    // If opencv.js fails to load entirely, mark the component errored.
    document.getElementById('opencvjs').addEventListener('error', () => {
      setComponent('cv', 'err', 'failed to load');
    });

    // ---------- 3) config ----------
    async function loadConfig() {
      setComponent('config', 'busy', 'fetching…');
      try {
        const resp = await fetch('/api/config');
        const cfg = await resp.json();
        if (!cfg.modalTrackerUrl) {
          setComponent('config', 'err', 'MODAL_TRACKER_URL not set on server');
          return;
        }
        // Strip any trailing slash so `${url}/healthz` doesn't become `//healthz`.
        state.modalUrl = cfg.modalTrackerUrl.replace(/\/+$/, '');
        setComponent('config', 'ok', 'loaded');
      } catch (err) {
        setComponent('config', 'err', err.message);
      }
    }

    // ---------- 4) Modal pre-warm ----------
    // First call after idle takes ~30s while the GPU container cold-boots.
    // Hit /healthz on page load so the server is warm by the time the user submits.
    async function prewarmModal() {
      if (!state.modalUrl) {
        setComponent('modal', 'err', 'no URL');
        return;
      }
      setComponent('modal', 'busy', 'warming up (≤60s on cold start)…');
      const url = state.modalUrl + '/healthz';
      const ctrl = new AbortController();
      const timeout = setTimeout(() => ctrl.abort(), 90000);
      try {
        const t0 = performance.now();
        const resp = await fetch(url, { signal: ctrl.signal });
        clearTimeout(timeout);
        if (!resp.ok) {
          setComponent('modal', 'err', 'healthz http ' + resp.status);
          return;
        }
        const dt = Math.round((performance.now() - t0) / 100) / 10;
        setComponent('modal', 'ok', `ready (${dt}s)`);
      } catch (err) {
        clearTimeout(timeout);
        setComponent('modal', 'err',
          err.name === 'AbortError' ? 'timed out after 90s' : err.message);
      }
    }

    // ---------- 5) submit prompt ----------
    function stopTracking() {
      // Cleanly tear down the active session so we can start a fresh T1 flow.
      state.tracking = false;
      state.sentInFlight = false;
      state.lastBbox = null;
      state.lastSamBbox = null;
      if (state.template) { state.template.delete(); state.template = null; }
      ctx.clearRect(0, 0, $overlay.width, $overlay.height);
      if (state.ws && state.ws.readyState === WebSocket.OPEN) {
        try {
          state.ws.send(JSON.stringify({
            type: 'close', session_id: state.sessionId,
          }));
        } catch (_) { /* ignore */ }
      }
      // Fresh session id so the server treats the next init as brand new.
      state.sessionId = 'sess-' + Math.random().toString(36).slice(2, 10);
    }

    async function onSubmit() {
      const message = $prompt.value.trim();
      if (!message) return;
      // If we're already tracking, the user wants to retarget — cut the flow.
      if (state.tracking) {
        stopTracking();
      }
      $send.disabled = true;
      $prompt.disabled = true;
      setStatus('asking T1 (Claude Opus) for the target bbox…');

      const frameJpegB64 = grabFrameJpegB64(0.85);
      const W = $video.videoWidth, H = $video.videoHeight;
      try {
        const resp = await fetch('/api/t1', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ frame: frameJpegB64, message, width: W, height: H }),
        });
        const data = await resp.json();
        if (!resp.ok || !data.bbox) {
          setStatus('T1 did not return a bbox: ' + (data.reasoning || data.error || JSON.stringify(data)));
          maybeEnableUI();
          return;
        }
        const [x1, y1, x2, y2] = data.bbox;
        const bbox = [
          Math.max(0, Math.round(x1)),
          Math.max(0, Math.round(y1)),
          Math.min(W, Math.round(x2)) - Math.max(0, Math.round(x1)),
          Math.min(H, Math.round(y2)) - Math.max(0, Math.round(y1)),
        ];
        setStatus('T1 → bbox ' + JSON.stringify(bbox) + ' — ' + data.reasoning);
        await initSamSession(frameJpegB64, [x1, y1, x2, y2]);
        seedLocalTracker(bbox);
        state.tracking = true;
        $prompt.value = '';
        // Re-enable the prompt so the user can retarget mid-tracking.
        maybeEnableUI();
        requestAnimationFrame(trackLoop);
      } catch (err) {
        setStatus('T1 error: ' + err.message);
        maybeEnableUI();
      }
    }

    $send.addEventListener('click', onSubmit);
    $prompt.addEventListener('keydown', e => { if (e.key === 'Enter') onSubmit(); });

    // ---------- 6) frame grab ----------
    function grabFrameJpegB64(quality) {
      const c = document.createElement('canvas');
      c.width = $video.videoWidth;
      c.height = $video.videoHeight;
      c.getContext('2d').drawImage($video, 0, 0);
      return c.toDataURL('image/jpeg', quality).split(',', 2)[1];
    }

    // ---------- 7) Modal websocket ----------
    function openSamWs() {
      return new Promise((resolve, reject) => {
        const wsUrl = state.modalUrl.replace(/^http/, 'ws') + '/ws';
        const ws = new WebSocket(wsUrl);
        ws.onopen = () => resolve(ws);
        ws.onerror = () => reject(new Error('ws error'));
        ws.onmessage = e => onSamMessage(JSON.parse(e.data));
        ws.onclose = onSamClose;
      });
    }

    async function initSamSession(frameJpegB64, bboxXYXY) {
      if (!state.ws || state.ws.readyState !== WebSocket.OPEN) {
        state.ws = await openSamWs();
      }
      state.ws.send(JSON.stringify({
        type: 'init', session_id: state.sessionId,
        frame: frameJpegB64, bbox: bboxXYXY,
      }));
    }

    function sendSamTrack() {
      if (!state.ws || state.ws.readyState !== WebSocket.OPEN) return;
      if (state.sentInFlight) return;
      const frameJpegB64 = grabFrameJpegB64(0.7);
      state.sentInFlight = true;
      // Include the browser's current local-tracker bbox as the prompt seed.
      // Because matchTemplate keeps a fixed-size template, this bbox doesn't
      // grow frame-to-frame, which breaks any mask-expansion feedback loop.
      state.ws.send(JSON.stringify({
        type: 'track', session_id: state.sessionId, frame: frameJpegB64,
        bbox: state.lastBbox || undefined,
      }));
    }

    function onSamMessage(msg) {
      if (msg.type === 'init_ok') {
        setStatus('SAM 2 session ready. tracking…');
      } else if (msg.type === 'init_fail') {
        setStatus('SAM 2 init failed (' + (msg.error || '') + ') — try a different prompt');
        state.tracking = false;
        maybeEnableUI();
      } else if (msg.type === 'bbox') {
        state.sentInFlight = false;
        if (msg.bbox) {
          state.lastSamBbox = msg.bbox;
          state.lastSamAt = performance.now();
          seedLocalTracker(msg.bbox);
        }
      } else if (msg.type === 'error') {
        state.sentInFlight = false;
        if (msg.error === 'no session' && state.tracking && state.lastBbox) {
          // Modal restarted and lost our session — re-init from current local bbox.
          console.warn('SAM session lost, re-initing');
          const [x, y, w, h] = state.lastBbox;
          initSamSession(grabFrameJpegB64(0.85), [x, y, x + w, y + h]);
        } else {
          console.warn('SAM ws error', msg);
        }
      }
    }

    async function onSamClose() {
      const wasTracking = state.tracking;
      state.ws = null;
      if (!wasTracking) return;
      // Auto-reconnect once. If that fails, drop tracking and re-enable the prompt.
      if (state.reconnectTried) {
        state.tracking = false;
        setStatus('SAM 2 connection lost twice — stopping. Re-submit a prompt to retry.');
        maybeEnableUI();
        return;
      }
      state.reconnectTried = true;
      setStatus('SAM 2 disconnected — reconnecting…');
      try {
        state.ws = await openSamWs();
        if (state.lastBbox) {
          const [x, y, w, h] = state.lastBbox;
          state.ws.send(JSON.stringify({
            type: 'init', session_id: state.sessionId,
            frame: grabFrameJpegB64(0.85), bbox: [x, y, x + w, y + h],
          }));
          // Allow another reconnect later if this connection also drops.
          setTimeout(() => { state.reconnectTried = false; }, 30000);
          setStatus('SAM 2 reconnected — resuming tracking');
        }
      } catch (err) {
        state.tracking = false;
        setStatus('SAM 2 reconnect failed: ' + err.message);
        maybeEnableUI();
      }
    }

    // ---------- 8) local tracker (cv.matchTemplate over a search window) ----------
    function seedLocalTracker(bbox) {
      const [x, y, w, h] = bbox;
      if (w <= 4 || h <= 4) return;
      const c = document.createElement('canvas');
      c.width = $video.videoWidth; c.height = $video.videoHeight;
      c.getContext('2d').drawImage($video, 0, 0);
      const src = cv.imread(c);
      const roi = src.roi(new cv.Rect(x, y, w, h));
      const gray = new cv.Mat();
      cv.cvtColor(roi, gray, cv.COLOR_RGBA2GRAY);
      if (state.template) state.template.delete();
      state.template = gray;
      roi.delete();
      src.delete();
      state.lastBbox = [x, y, w, h];
    }

    function trackLocal() {
      if (!state.template || !state.lastBbox) return;
      const [lx, ly, lw, lh] = state.lastBbox;
      const c = document.createElement('canvas');
      c.width = $video.videoWidth; c.height = $video.videoHeight;
      c.getContext('2d').drawImage($video, 0, 0);
      const frame = cv.imread(c);
      const fg = new cv.Mat();
      cv.cvtColor(frame, fg, cv.COLOR_RGBA2GRAY);
      const cx = lx + lw / 2, cy = ly + lh / 2;
      const sw = Math.min(fg.cols, lw * 3);
      const sh = Math.min(fg.rows, lh * 3);
      const sx = Math.max(0, Math.min(fg.cols - sw, Math.round(cx - sw / 2)));
      const sy = Math.max(0, Math.min(fg.rows - sh, Math.round(cy - sh / 2)));
      const search = fg.roi(new cv.Rect(sx, sy, sw, sh));
      const result = new cv.Mat();
      try {
        cv.matchTemplate(search, state.template, result, cv.TM_CCOEFF_NORMED);
        const mm = cv.minMaxLoc(result);
        const newX = sx + mm.maxLoc.x;
        const newY = sy + mm.maxLoc.y;
        state.lastBbox = [newX, newY, lw, lh];
      } catch (e) {
        // template may be larger than search if bbox shrunk; skip frame
      }
      result.delete(); search.delete(); fg.delete(); frame.delete();
    }

    function drawOverlay() {
      ctx.clearRect(0, 0, $overlay.width, $overlay.height);
      if (state.lastBbox) {
        const [x, y, w, h] = state.lastBbox;
        ctx.strokeStyle = '#ff3b30';
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, w, h);
      }
      if (state.lastSamBbox && performance.now() - state.lastSamAt < 250) {
        const [x, y, w, h] = state.lastSamBbox;
        ctx.strokeStyle = '#00aaff';
        ctx.lineWidth = 3;
        ctx.strokeRect(x, y, w, h);
      }
    }

    // ---------- 9) main loop ----------
    function trackLoop(t) {
      if (!state.tracking) return;
      trackLocal();
      drawOverlay();
      if (t - state.lastSnap > state.snapEveryMs) {
        state.lastSnap = t;
        sendSamTrack();
      }
      requestAnimationFrame(trackLoop);
    }

    // ---------- bootstrap ----------
    // Camera + opencv.js + config can all start in parallel.
    // Modal pre-warm waits on config since it needs the URL.
    startWebcam();
    loadConfig().then(prewarmModal);
    maybeEnableUI();
  })();
  </script>
</body>
</html>
