<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>LaiRA Control</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <!-- Add p5.js and ml5.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
    <style>
      /* === Reset & base === */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
      }
      html,
      body {
        height: 100%;
        background: #121212;
        color: #e0e0e0;
      }

      /* === Layout wrappers === */
      #app {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
      }
      #videoWrapper {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        max-width: 100vw;
        max-height: 85vh;
      }
      #remoteVideo {
        max-width: 100%;
        max-height: 100%;
        border-radius: 8px;
        background: #000;
        object-fit: contain;
        cursor: pointer;
      }
      #remoteAudio {
        display: none; /* hidden element, audio still plays */
      }
      #enableAudio {
        position: fixed;
        bottom: 6rem;
        left: 50%;
        transform: translateX(-50%);
        background: #4f46e5;
        border: none;
        color: #fff;
        font-weight: 600;
        padding: 0.6rem 1.4rem;
        border-radius: 9999px;
        cursor: pointer;
        display: none;
        z-index: 50;
      }

      /* === NEW: audio toggle button === */
      #audioToggle {
        position: absolute;
        top: 0.5rem;
        left: 0.5rem;
        padding: 0.4rem 0.8rem;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        border: none;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        z-index: 30;
      }
      #audioToggle:hover {
        background: rgba(255, 255, 255, 0.18);
      }

      /* === p5.js canvas overlay === */
      #p5Canvas {
        position: absolute;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 5;
      }

      /* === fullscreen stretch while keeping UI === */
      body.fullscreen #videoWrapper {
        position: fixed;
        left: 0;
        top: 0;
        width: 100vw;
        height: 100vh;
        max-width: none;
        max-height: none;
        z-index: 10;
      }
      body.fullscreen #remoteVideo {
        width: 100%;
        height: 100%;
        max-width: none;
        max-height: none;
      }

      /* === Fullscreen toggle button === */
      .fs-btn {
        position: absolute;
        top: 0.5rem;
        right: 0.5rem;
        width: 34px;
        height: 34px;
        border: none;
        border-radius: 6px;
        background: rgba(0, 0, 0, 0.55);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 0.2s;
        z-index: 12;
      }
      .fs-btn:hover {
        background: rgba(255, 255, 255, 0.18);
      }
      .fs-btn svg {
        width: 18px;
        height: 18px;
        fill: #e0e0e0;
        pointer-events: none;
      }
      body.fullscreen .fs-btn svg.icon-enter {
        display: none;
      }
      body:not(.fullscreen) .fs-btn svg.icon-exit {
        display: none;
      }

      /* === Placeholder === */
      #placeholder {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        color: #777;
        font-size: 1rem;
        text-align: center;
        pointer-events: none;
      }

      /* === NEW: control hint === */
      #controlHint {
        position: fixed;
        bottom: 5.5rem;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.95rem;
        font-weight: 500;
        text-align: center;
        pointer-events: none;
        color: #a1a1a1;
        z-index: 19;
      }
      body.fullscreen #controlHint {
        display: none;
      } /* hide in fullscreen */

      /* === Bottom command bar === */
      #commandBar {
        position: fixed;
        bottom: 1rem;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 0.5rem;
        width: calc(100% - 4rem);
        max-width: 920px;
        background: #222;
        border-radius: 9999px;
        padding: 0.6rem 1rem;
        backdrop-filter: blur(4px);
        z-index: 20;
      }
      body.fullscreen #commandBar {
        background: rgba(34, 34, 34, 0.6);
      }
      #userMessage {
        flex: 1;
        background: #000;
        border: none;
        outline: none;
        color: #e0e0e0;
        font-size: 1rem;
        padding: 0.6rem 1rem;
        border-radius: 9999px;
      }
      #sendCommandButton {
        background: #4f46e5;
        border: none;
        color: #fff;
        font-weight: 600;
        padding: 0.6rem 1.4rem;
        border-radius: 9999px;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      #sendCommandButton:hover {
        opacity: 0.85;
      }

      /* === Side command buttons === */
      #sideButtons {
        position: fixed;
        right: 1rem;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        gap: 0.8rem;
        z-index: 15;
      }
      .side-btn {
        background: #333;
        color: #e0e0e0;
        border: none;
        padding: 0.75rem 1.4rem;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: background 0.2s, opacity 0.2s;
      }
      .side-btn:hover {
        background: #555;
      }
      .side-btn.disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      .side-btn.disabled:hover {
        background: #333;
      }
      .side-btn.active {
        background: #4f46e5;
        color: #fff;
      }
      .side-btn.active:hover {
        background: #6366f1;
      }
      body.fullscreen .side-btn {
        opacity: 0.4;
      }
      body.fullscreen .side-btn:hover {
        opacity: 1;
      }

      /* === AI Follow status === */
      #aiStatus {
        position: fixed;
        top: 1rem;
        left: 50%;
        transform: translateX(-50%);
        background: #4f46e5;
        color: #fff;
        padding: 0.5rem 1.5rem;
        border-radius: 9999px;
        font-weight: 600;
        z-index: 25;
        display: none;
      }
      body.ai-follow-active #aiStatus {
        display: block;
      }

      /* === Scrollbar (minimal) === */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-thumb {
        background: #444;
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <!-- AI Follow status indicator -->
    <div id="aiStatus">AI Follow Mode: <span id="aiAction">Searching</span></div>

    <div id="app">
      <div id="videoWrapper">
        <video id="remoteVideo" autoplay playsinline muted></video>
        <audio id="remoteAudio" autoplay muted></audio>
        <button id="enableAudio">Enable Audio</button>

        <!-- NEW audio toggle -->
        <button id="audioToggle">🔇 Muted</button>

        <!-- Fullscreen toggle button -->
        <button id="fsToggle" class="fs-btn" aria-label="Toggle Fullscreen">
          <!-- icons omitted for brevity -->
        </button>

        <div id="placeholder">
          Waiting for LaiRA...<br />Your video feed will appear here.
        </div>
      </div>
    </div>

    <!-- Side command buttons -->
    <div id="sideButtons">
      <button class="side-btn" data-cmd="dock">Dock</button>
      <button class="side-btn" data-cmd="sit">Sit</button>
      <button class="side-btn" data-cmd="lie down">Lie&nbsp;Down</button>
      <button class="side-btn" data-cmd="shake">Shake</button>
      <button id="aiFollowBtn" class="side-btn">AI&nbsp;Follow</button>
    </div>

    <!-- Control hint -->
    <div id="controlHint">
      Use the W, A, S, and D keys to move forward, backward, left and right
      respectively &nbsp;•&nbsp; IF YOU ARE ON A PHONE, GO TO A COMPUTER IT WILL NOT WORK OTHERWISE (commit 5)
    </div>

    <!-- Bottom text/command bar -->
    <div id="commandBar">
      <input id="userMessage" placeholder="Send a message to LaiRA..." autocomplete="off" />
      <button id="sendCommandButton">Send</button>
    </div>

    <script>
      // Global animation stop sending thing
      let stopSend = false;
      let rafId = null;
      let aiFollowMode = false;
      let p5Instance = null;
      let objectDetector = null;
      
      // AI Follow control parameters
      const horizontalDeadzone = 100;
      const targetPersonWidth = 350;
      const widthDeadzone = 40;
      let currentAIAction = "searching";

      const userSocketA = new WebSocket("wss://" + window.location.hostname + "/user");
      const userSocketB = new WebSocket("wss://" + window.location.hostname + "/forward");

      let peerConnection;
      let remoteDescriptionSet = false;
      let candidateQueue = [];

      const video = document.getElementById("remoteVideo");
      const placeholder = document.getElementById("placeholder");

      video.addEventListener("loadedmetadata", () => (placeholder.style.display = "none"));

      const fsBtn = document.getElementById("fsToggle");
      function toggleFullscreen() {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen();
        } else {
          document.exitFullscreen();
        }
      }
      fsBtn.addEventListener("click", toggleFullscreen);
      video.addEventListener("dblclick", toggleFullscreen);
      document.addEventListener("fullscreenchange", () =>
        document.body.classList.toggle("fullscreen", !!document.fullscreenElement)
      );

      const keyStates = { w: false, a: false, s: false, d: false, q: false, e: false };

      function sendKeyStates() {
        if (userSocketA.readyState === WebSocket.OPEN && !aiFollowMode) {
          const ks = {};
          for (const k in keyStates) ks[k] = keyStates[k] ? "True" : "False";
          if (!stopSend) {
            userSocketA.send(JSON.stringify({ type: "chat-message", message: JSON.stringify({ keystates: ks }) }));
          }
        }
      }
      function animationLoop(){ sendKeyStates(); rafId = requestAnimationFrame(animationLoop); }
      userSocketA.addEventListener("open", () => { rafId = requestAnimationFrame(animationLoop); });

      document.addEventListener("keydown", e=>{
        const k=e.key.toLowerCase();
        if (e.key.toLowerCase() === 'l' && !aiFollowMode) runCustomAnimations('lie down');
        if(k in keyStates && !aiFollowMode){
          if(stopSend){ stopSend = false; rafId = requestAnimationFrame(animationLoop); }
          keyStates[k] = true;
        }
      });
      document.addEventListener("keyup", (e) => { const k = e.key.toLowerCase(); if (k in keyStates && !aiFollowMode) keyStates[k] = false; });

      function sendText() {
        if (aiFollowMode) return;
        const txt = document.getElementById("userMessage").value.trim();
        if (txt) {
          userSocketA.send(JSON.stringify({ type: "chat-message", message: txt }));
          document.getElementById("userMessage").value = "";
        }
      }
      document.getElementById("sendCommandButton").addEventListener("click", sendText);
      document.getElementById("userMessage").addEventListener("keydown", (e) => { if (e.key === "Enter") sendText(); });

      document.querySelectorAll(".side-btn[data-cmd]").forEach((btn) =>
        btn.addEventListener("click", () => { if (!aiFollowMode) { runCustomAnimations(btn.dataset.cmd); } })
      );

      const aiFollowBtn = document.getElementById("aiFollowBtn");
      aiFollowBtn.addEventListener("click", toggleAIFollowMode);

      function toggleAIFollowMode() {
        aiFollowMode = !aiFollowMode;
        if (aiFollowMode) {
          userSocketA.send(JSON.stringify({ type: "chat-message", message: JSON.stringify({ aimode: 'hi' }) }));
          document.body.classList.add("ai-follow-active");
          aiFollowBtn.classList.add("active");
          document.querySelectorAll(".side-btn[data-cmd]").forEach(btn => { btn.classList.add("disabled"); });
          document.getElementById("sendCommandButton").classList.add("disabled");
          document.getElementById("userMessage").disabled = true;
          if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }
          stopSend = true;
          for (const k in keyStates) keyStates[k] = false;
          startP5PersonDetection();
        } else {
          userSocketA.send(JSON.stringify({ type: "chat-message", message: JSON.stringify({ noaimode: 'bye' }) }));
          document.body.classList.remove("ai-follow-active");
          aiFollowBtn.classList.remove("active");
          document.querySelectorAll(".side-btn[data-cmd]").forEach(btn => { btn.classList.remove("disabled"); });
          document.getElementById("sendCommandButton").classList.remove("disabled");
          document.getElementById("userMessage").disabled = false;
          if (userSocketA.readyState === WebSocket.OPEN) {
            userSocketA.send(JSON.stringify({ type: "chat-message", message: JSON.stringify({ keystates: { w:"False",a:"False",s:"False",d:"False",q:"False",e:"False" } }) }));
          }
          stopP5PersonDetection();
          stopSend = false;
          rafId = requestAnimationFrame(animationLoop);
        }
      }

      function startP5PersonDetection() {
        const sketch = function(p) {
          let detections = [];
          let canvas;
          p.setup = function() {
            const videoElement = document.getElementById('remoteVideo');
            canvas = p.createCanvas(videoElement.clientWidth, videoElement.clientHeight);
            canvas.parent('videoWrapper'); canvas.id('p5Canvas');
            objectDetector = ml5.objectDetector('cocossd', {}, function() { console.log('Object detector loaded'); detectObjects(); });
          };
          p.draw = function() {
            p.clear();
            for (let detection of detections) {
              if (detection.label === 'person') {
                p.noFill(); p.stroke(255, 0, 0); p.strokeWeight(3);
                const videoElement = document.getElementById('remoteVideo');
                const scaleX = p.width / videoElement.videoWidth;
                const scaleY = p.height / videoElement.videoHeight;
                p.rect(detection.x * scaleX,detection.y * scaleY,detection.width * scaleX,detection.height * scaleY);
              }
            }
          };
          function detectObjects() {
            if (!aiFollowMode || !objectDetector) return;
            const videoElement = document.getElementById('remoteVideo');
            if (videoElement.readyState >= 2) {
              objectDetector.detect(videoElement, function(err, results) {
                if (!err && results) {
                  detections = results;
                  let personDetected = false;
                  for (let detection of detections) {
                    if (detection.label === 'person') {
                      personDetected = true;
                      const personCenterX = detection.x + (detection.width / 2);
                      const videoCenterX = videoElement.videoWidth / 2;
                      const horizontalOffset = personCenterX - videoCenterX;
                      const personWidth = detection.width;
                      let aiKeystates = { w:false,a:false,s:false,d:false,q:false,e:false };
                      let action = "tracking";
                      if (Math.abs(horizontalOffset) > horizontalDeadzone) {
                        if (horizontalOffset > 0) { aiKeystates.d = true; action = "turning right"; }
                        else { aiKeystates.a = true; action = "turning left"; }
                      } else {
                        const widthDifference = personWidth - targetPersonWidth;
                        if (Math.abs(widthDifference) > widthDeadzone) {
                          if (widthDifference < 0) { aiKeystates.w = true; action = "moving forward"; }
                          else { aiKeystates.s = true; action = "moving backward"; }
                        }
                      }
                      currentAIAction = action; document.getElementById('aiAction').textContent = action.charAt(0).toUpperCase() + action.slice(1);
                      if (userSocketA.readyState === WebSocket.OPEN) {
                        const ks = {}; for (const k in aiKeystates) ks[k] = aiKeystates[k] ? "True" : "False";
                        userSocketA.send(JSON.stringify({ type: "chat-message", message: JSON.stringify({ keystates: ks }) }));
                      }
                      break;
                    }
                  }
                  if (!personDetected) {
                    currentAIAction = "searching"; document.getElementById('aiAction').textContent = "Searching";
                    if (userSocketA.readyState === WebSocket.OPEN) {
                      userSocketA.send(JSON.stringify({ type: "chat-message", message: JSON.stringify({ keystates: { w:"False",a:"False",s:"False",d:"False",q:"False",e:"False" } }) }));
                    }
                  }
                }
                if (aiFollowMode) { setTimeout(detectObjects, 100); }
              });
            } else { setTimeout(detectObjects, 500); }
          }
        };
        p5Instance = new p5(sketch);
      }
      function stopP5PersonDetection() { if (p5Instance) { p5Instance.remove(); p5Instance = null; } objectDetector = null; }
//[back right leg],[front leg],[back left leg],[front leg]
      function runCustomAnimations(cmd){
        if(rafId!==null){ cancelAnimationFrame(rafId); rafId = null; }
        stopSend = true;
        userSocketA.send(JSON.stringify({ type:"chat-message", message: JSON.stringify({ keystates:{w:false,a:false,s:false,d:false,q:false,e:false} }) }));
        if(cmd==="dock"){ userSocketA.send(JSON.stringify({ type:"chat-message", message: JSON.stringify({ ik:[[60,0,0],[60,0,0],[60,0,0],[60,0,0]] }) })); }
        else if(cmd==="sit"){ userSocketA.send(JSON.stringify({ type:"chat-message", message: JSON.stringify({ angle:[[90,172,142],[90,200,50],[90,170,144],[90,200,50]] }) })); }
        else if(cmd==="shake"){ userSocketA.send(JSON.stringify({ type:"chat-message", message: JSON.stringify({ angle:[[90,200,110],[90,240,100],[90,170,144],[90,200,50]] }) })); setTimeout(() => { userSocketA.send(JSON.stringify({ type: "chat-message", message: JSON.stringify({ action: "shake" }) })); }, 500); }
        else if(cmd==="lie down"){ userSocketA.send(JSON.stringify({ type:"chat-message", message: JSON.stringify({ angle:[[90,200,135],[90,200,135],[90,200,135],[90,200,135]] }) })); setTimeout(() => { userSocketA.send(JSON.stringify({ type: "chat-message", message: JSON.stringify({ action: "rest" }) })); }, 500); }
      }

      userSocketA.addEventListener("open", () => { console.log("Socket A connected"); });
      userSocketB.addEventListener("open", () => console.log("Socket B connected"));
      let handshakeTimer = null;
      userSocketA.addEventListener("message", async (event) => {
        try {
          const data = await (event.data instanceof Blob ? event.data.text() : event.data);
          const parsed = JSON.parse(data);
          if (parsed.type === "laiRA-connected") {
            if (handshakeTimer) clearTimeout(handshakeTimer);
            handshakeTimer = setTimeout(() => {
              handshakeTimer = null;
              if (peerConnection) { console.log("🗑 closing old PeerConnection"); peerConnection.close(); peerConnection = null; remoteDescriptionSet = false; candidateQueue = []; }
              console.log("🚀 starting new handshake");
              startPeerConnection();
            }, 200);
          } else if (parsed.type === "answer") {
            await peerConnection.setRemoteDescription(parsed);
            remoteDescriptionSet = true;
            for (const c of candidateQueue) await peerConnection.addIceCandidate(c);
            candidateQueue = [];
          } else if (parsed.type === "ice-candidate") {
            const cand = new RTCIceCandidate(parsed.candidate);
            if (remoteDescriptionSet) await peerConnection.addIceCandidate(cand);
            else candidateQueue.push(cand);
          } else if (parsed.type === "chat-message") { userSocketB.send(JSON.stringify(parsed)); }
        } catch (err) { console.error("Error handling message", err); }
      });

      async function startPeerConnection() {
        try {
          const resp = await fetch("https://laira.metered.live/api/v1/turn/credentials?apiKey=cc105e937e35e7e785bafba97c04621dea2a");
          const iceServers = await resp.json();
          peerConnection = new RTCPeerConnection({ iceServers, iceTransportPolicy: "relay" });
          peerConnection.addTransceiver("video", { direction: "recvonly" });
          peerConnection.addTransceiver("audio", { direction: "recvonly" });

          peerConnection.ontrack = async (ev) => {
            const stream = ev.streams[0];
            if (ev.track.kind === "video") {
              document.getElementById("remoteVideo").srcObject = stream;
              placeholder.style.display = "none";
            } else if (ev.track.kind === "audio") {
              const audioEl = document.getElementById("remoteAudio");
              audioEl.srcObject = stream;
              console.log("🎵 Received remote audio track, stream attached.");
            }
          };

          const audioEl = document.getElementById("remoteAudio");
          const audioToggle = document.getElementById("audioToggle");
          let audioEnabled = false;
          audioToggle.onclick = async () => {
            if (!audioEl.srcObject) {
              console.warn("No audio stream yet.");
              return;
            }
            if (audioEnabled) {
              audioEl.muted = true;
              audioEl.pause();
              audioToggle.textContent = "🔇 Muted";
              console.log("🔇 Audio muted/paused by user.");
            } else {
              try {
                await audioEl.play();
                audioEl.muted = false;
                audioToggle.textContent = "🔈 Unmuted";
                console.log("🔈 Audio resumed/unmuted by user.");
              } catch (e) {
                console.error("Audio resume failed:", e);
              }
            }
            audioEnabled = !audioEnabled;
          };

          peerConnection.onicecandidate = ({ candidate }) => {
            if (candidate) userSocketA.send(JSON.stringify({ type: "ice-candidate", candidate: candidate.toJSON() }));
          };

          const offer = await peerConnection.createOffer();
          await peerConnection.setLocalDescription(offer);
          userSocketA.send(JSON.stringify(peerConnection.localDescription));
        } catch (err) {
          console.error("Peer connection error", err);
        }
      }
    </script>
  </body>
</html>
